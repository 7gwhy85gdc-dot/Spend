<title>حاسبة الالتزامات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:    #0B1929;
  --navy2:   #122338;
  --blue:    #1A6FD4;
  --blue-lt: #2E8AF0;
  --blue-bg: #0D2E50;
  --green:   #0D9E5C;
  --green-lt:#D1FAE5;
  --green-dk:#065F46;
  --red:     #E53E3E;
  --red-lt:  #FEE2E2;
  --red-dk:  #9B1C1C;
  --orange:  #DD6B20;
  --org-lt:  #FEF3C7;
  --org-dk:  #92400E;
  --gray:    #1E3347;
  --gray2:   #2A4560;
  --gray3:   #8BA8C2;
  --white:   #FFFFFF;
  --text:    #E8F0FA;
  --text2:   #8BA8C2;
  --card:    #132030;
  --card2:   #0F1E2E;
  --border:  #1E3347;
  --radius:  14px;
  --shadow:  0 4px 24px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 180px;
}

/* ── BACKGROUND ─────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%, #0D2E5020 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, #1A6FD415 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ── HEADER ─────────────────────────────────────── */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(180deg, var(--navy) 0%, rgba(11,25,41,0.95) 100%);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 12px;
}
.header-top {
  display: flex; justify-content: space-between; align-items: center;
}
.app-title {
  font-size: 18px; font-weight: 700; color: var(--white);
  letter-spacing: -0.3px;
}
.app-title span { color: var(--blue-lt); }
.header-date {
  font-size: 12px; color: var(--text2); margin-top: 4px;
}
.btn-add-header {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--blue); border: none;
  color: white; font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 12px rgba(26,111,212,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-add-header:active { transform: scale(0.92); }
.btn-refresh-header {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--card2); border: 1px solid var(--border);
  color: var(--text2); font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, background 0.2s;
  margin-left: 8px;
}
.btn-refresh-header:active { transform: scale(0.9); }
.btn-refresh-header.spinning { animation: spinRefresh 0.6s ease; }
@keyframes spinRefresh { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.header-top { gap: 8px; }

/* ── KPI CARDS ──────────────────────────────────── */
.kpi-scroll {
  display: flex; gap: 12px; overflow-x: auto;
  padding: 16px 20px 4px;
  scrollbar-width: none;
  position: relative; z-index: 1;
}
.kpi-scroll::-webkit-scrollbar { display: none; }
.kpi-card {
  flex: 0 0 auto; min-width: 130px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  position: relative; overflow: hidden;
  transition: transform 0.15s;
}
.kpi-card::before {
  content: '';
  position: absolute; top: 0; right: 0; left: 0; height: 3px;
  border-radius: var(--radius) var(--radius) 0 0;
}
.kpi-card.total::before  { background: var(--blue); }
.kpi-card.paid::before   { background: var(--green); }
.kpi-card.pending::before{ background: var(--orange); }
.kpi-card.late::before   { background: var(--red); }
.kpi-card.next::before   { background: #7C3AED; }
.kpi-label {
  font-size: 11px; color: var(--text2); margin-bottom: 6px;
  display: flex; align-items: center; gap: 5px;
}
.kpi-amount {
  font-size: 20px; font-weight: 700; color: var(--white);
  letter-spacing: -0.5px; line-height: 1;
}
.kpi-amount .currency {
  font-size: 12px; font-weight: 400; color: var(--text2); margin-right: 2px;
}
.kpi-sub {
  font-size: 11px; color: var(--text2); margin-top: 4px;
}

/* ── NAV TABS ───────────────────────────────────── */
.nav-tabs {
  display: flex; gap: 8px;
  padding: 12px 20px 0;
  position: relative; z-index: 1;
}
.nav-tab {
  flex: 1; padding: 9px 3px;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text2);
  font-size: 11.5px; font-weight: 500;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  cursor: pointer; transition: all 0.2s;
  text-align: center; white-space: nowrap;
}
.nav-tab.active {
  background: var(--blue-bg); border-color: var(--blue);
  color: var(--blue-lt); font-weight: 600;
}

/* ── SECTION TITLE ──────────────────────────────── */
.section-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px 10px;
  position: relative; z-index: 1;
}
.section-title { font-size: 15px; font-weight: 600; color: var(--white); }
.section-count {
  font-size: 12px; color: var(--text2);
  background: var(--gray); padding: 3px 10px; border-radius: 20px;
}

/* ── OBLIGATION CARD ────────────────────────────── */
.obligations-list {
  padding: 0 16px;
  display: flex; flex-direction: column; gap: 10px;
  position: relative; z-index: 1;
}
.ob-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform 0.15s;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.ob-card.status-paid   { border-right: 4px solid var(--green); }
.ob-card.status-pending{ border-right: 4px solid var(--orange); }
.ob-card.status-late   { border-right: 4px solid var(--red); }
.ob-card.status-future { border-right: 4px solid var(--blue); }
.ob-card.status-done   { opacity: 0.5; border-right: 4px solid var(--gray3); }

.ob-main {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 14px 14px 10px;
}
.ob-info { flex: 1; }
.ob-name {
  font-size: 14px; font-weight: 600; color: var(--white);
  margin-bottom: 5px;
}
.ob-meta {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 20px;
  font-size: 10px; font-weight: 500;
}
.badge-cat  { background: var(--gray2); color: var(--text2); }
.badge-paid  { background: var(--green-lt); color: var(--green-dk); }
.badge-pending{ background: var(--org-lt); color: var(--org-dk); }
.badge-late  { background: var(--red-lt); color: var(--red-dk); }
.badge-future{ background: #EDE9FE; color: #5B21B6; }
.badge-temp  { background: #FEF3C7; color: #92400E; }

.ob-right { text-align: left; flex-shrink: 0; margin-right: 12px; }
.ob-amount {
  font-size: 18px; font-weight: 700; color: var(--white);
  letter-spacing: -0.5px;
}
.ob-amount .cur { font-size: 11px; color: var(--text2); font-weight: 400; }
.ob-due {
  font-size: 11px; color: var(--text2); margin-top: 3px; text-align: left;
}

.ob-footer {
  display: flex; gap: 6px;
  padding: 0 14px 12px;
}
.btn-ob {
  flex: 1; padding: 8px;
  border-radius: 9px; border: none;
  font-size: 12px; font-weight: 600;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  cursor: pointer; transition: all 0.15s;
}
.btn-ob:active { transform: scale(0.96); }
.btn-pay {
  background: linear-gradient(135deg, var(--green), #059669);
  color: white; box-shadow: 0 2px 8px rgba(13,158,92,0.3);
}
.btn-edit {
  background: var(--gray2); color: var(--text2);
  flex: 0 0 40px;
}
.btn-del {
  background: rgba(229,62,62,0.12); color: var(--red);
  flex: 0 0 40px;
}

/* ── EMPTY STATE ────────────────────────────────── */
.empty-state {
  text-align: center; padding: 48px 32px;
  position: relative; z-index: 1;
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 600; color: var(--white); margin-bottom: 6px; }
.empty-sub { font-size: 13px; color: var(--text2); }

/* ── HISTORY ENTRIES ────────────────────────────── */
.history-list {
  padding: 0 16px;
  display: flex; flex-direction: column; gap: 8px;
  position: relative; z-index: 1;
}
.hist-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px;
  animation: slideIn 0.25s ease;
}
.hist-left { flex: 1; min-width: 0; }
.hist-name { font-size: 13px; font-weight: 600; color: var(--white); }
.hist-meta { font-size: 11px; color: var(--text2); margin-top: 3px; }
.hist-right { text-align: left; flex-shrink: 0; }
.hist-amount { font-size: 16px; font-weight: 700; color: var(--green); }
.hist-method { font-size: 11px; color: var(--text2); }
.hist-del {
  flex-shrink: 0; width: 34px; height: 34px; border-radius: 9px;
  background: rgba(229,62,62,0.12); color: var(--red);
  border: none; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, background 0.2s;
}
.hist-del:active { transform: scale(0.9); background: rgba(229,62,62,0.22); }

/* ── SUMMARY ────────────────────────────────────── */
.summary-grid {
  padding: 0 16px;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; position: relative; z-index: 1;
}
.sum-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
}
.sum-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.sum-value { font-size: 18px; font-weight: 700; color: var(--white); }
.sum-bar-wrap { margin-top: 8px; background: var(--gray); border-radius: 4px; height: 4px; overflow: hidden; }
.sum-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

/* ── FAB ────────────────────────────────────────── */
.fab {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 200;
  background: linear-gradient(135deg, var(--blue), var(--blue-lt));
  color: white; border: none;
  padding: 14px 32px; border-radius: 50px;
  font-size: 14px; font-weight: 700;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(26,111,212,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
  display: flex; align-items: center; gap: 8px;
  white-space: nowrap;
}
.fab:active { transform: translateX(-50%) scale(0.95); }

/* ── MODAL ──────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  width: 100%; background: var(--navy2);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 40px;
  border: 1px solid var(--border);
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.34,1.06,0.64,1);
  max-height: 92vh; overflow-y: auto;
}
.overlay.open .modal { transform: translateY(0); }
.modal-handle {
  width: 40px; height: 4px; background: var(--gray2);
  border-radius: 2px; margin: 0 auto 20px;
}
.modal-title {
  font-size: 17px; font-weight: 700; color: var(--white);
  margin-bottom: 20px; text-align: center;
}

/* ── FORM ───────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; }
.form-control {
  width: 100%; padding: 12px 14px;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--white);
  font-size: 14px; font-family: 'IBM Plex Sans Arabic', sans-serif;
  outline: none; transition: border-color 0.2s;
  text-align: right;
}
.form-control:focus { border-color: var(--blue); }
.form-control option { background: var(--navy2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn-modal-confirm {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--blue), var(--blue-lt));
  color: white; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  cursor: pointer; margin-top: 8px;
  box-shadow: 0 2px 16px rgba(26,111,212,0.4);
  transition: transform 0.15s;
}
.btn-modal-confirm:active { transform: scale(0.98); }
.btn-modal-cancel {
  width: 100%; padding: 12px;
  background: transparent; color: var(--text2);
  border: 1px solid var(--border); border-radius: 12px;
  font-size: 14px; font-family: 'IBM Plex Sans Arabic', sans-serif;
  cursor: pointer; margin-top: 8px;
}

/* ── PAY MODAL ──────────────────────────────────── */
.pay-info {
  background: var(--card2); border-radius: 12px;
  padding: 14px; margin-bottom: 16px; text-align: center;
}
.pay-info-name { font-size: 16px; font-weight: 700; color: var(--white); }
.pay-info-date { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* ── TOAST ──────────────────────────────────────── */
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
  z-index: 400; background: var(--green);
  color: white; padding: 10px 20px; border-radius: 50px;
  font-size: 13px; font-weight: 600;
  box-shadow: 0 4px 20px rgba(13,158,92,0.4);
  opacity: 0; pointer-events: none;
  transition: all 0.3s;
  white-space: nowrap;
}
.toast.error { background: var(--red); box-shadow: 0 4px 20px rgba(229,62,62,0.4); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── REMAINING BADGE ────────────────────────────── */
.rem-badge {
  font-size: 10px; background: var(--org-lt); color: var(--org-dk);
  padding: 2px 7px; border-radius: 20px; font-weight: 500;
}

/* ── FILTER BAR ─────────────────────────────────── */
.filter-bar {
  display: flex; gap: 6px; overflow-x: auto;
  padding: 8px 16px 0; scrollbar-width: none;
  position: relative; z-index: 1;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex: 0 0 auto; padding: 5px 12px;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text2);
  font-size: 11px; font-weight: 500;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  cursor: pointer; transition: all 0.2s;
}
.filter-chip.active {
  background: var(--blue-bg); border-color: var(--blue); color: var(--blue-lt);
}

/* ── SALARY BAR ──────────────────────────────────── */
.salary-bar {
  margin: 12px 16px 0;
  background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0;
  overflow: hidden;
  position: relative; z-index: 1;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.salary-bar::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--blue), var(--green));
}
.salary-inner {
  display: flex; gap: 0; align-items: stretch;
}
.salary-left {
  flex: 1; padding: 14px 16px 12px;
  border-left: 1px solid var(--border);
}
.salary-label {
  font-size: 10px; color: var(--text2); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.salary-input-wrap { position: relative; }
.salary-input-wrap::after {
  content: 'ر.س';
  position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
  font-size: 10px; color: var(--text2);
  pointer-events: none;
}
.salary-input {
  width: 100%;
  background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 9px; color: var(--white);
  font-size: 17px; font-weight: 700;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  padding: 7px 10px 7px 28px; outline: none; text-align: right;
  transition: border-color 0.2s;
}
.salary-input:focus { border-color: var(--blue); }
.salary-right { flex: 1; padding: 14px 16px 12px; text-align: center; }
.salary-remain-label { font-size: 10px; color: var(--text2); margin-bottom: 4px; }
.salary-remain-val {
  font-size: 19px; font-weight: 800; letter-spacing: -0.5px;
  transition: color 0.3s; line-height: 1.1;
}
.salary-remain-val.positive { color: var(--green); }
.salary-remain-val.negative { color: var(--red); }
.salary-remain-val.zero     { color: var(--text2); }
.salary-pct-label { font-size: 10px; color: var(--text2); margin-top: 2px; }
.salary-progress-wrap {
  margin: 0 16px 12px; height: 5px;
  background: var(--gray); border-radius: 3px; overflow: hidden;
}
.salary-progress-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.6s cubic-bezier(.4,0,.2,1), background 0.3s;
}

/* ── THEME PICKER ─────────────────────────────────── */
.theme-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 4px;
}
.theme-swatch {
  border-radius: 12px; border: 2px solid transparent;
  cursor: pointer; overflow: hidden; transition: transform 0.15s, border-color 0.2s;
  aspect-ratio: 1; position: relative;
}
.theme-swatch:active { transform: scale(0.93); }
.theme-swatch.selected { border-color: var(--white); box-shadow: 0 0 0 2px var(--blue); }
.theme-swatch-preview { width: 100%; height: 70%; display: flex; }
.theme-swatch-preview span { flex: 1; display: block; }
.theme-swatch-name {
  font-size: 10px; font-weight: 600; color: var(--white);
  text-align: center; padding: 5px 2px;
  background: rgba(0,0,0,0.45);
  position: absolute; bottom: 0; left: 0; right: 0;
}
.theme-section-title { font-size: 12px; color: var(--text2); margin-bottom: 8px; margin-top: 12px; }
.color-editor { display: flex; flex-direction: column; gap: 9px; max-height: 240px; overflow-y: auto; }
.color-row { display: flex; align-items: center; gap: 10px; }
.color-row label { flex: 1; font-size: 12px; color: var(--text2); }
.color-row input[type=color] {
  width: 44px; height: 34px;
  border: 2px solid var(--border); border-radius: 8px;
  background: none; cursor: pointer; padding: 2px;
}
.btn-theme-reset {
  width: 100%; padding: 10px;
  background: transparent; color: var(--text2);
  border: 1px solid var(--border); border-radius: 12px;
  font-size: 13px; font-family: 'IBM Plex Sans Arabic', sans-serif;
  cursor: pointer; margin-top: 8px;
}
.btn-float {
  position: fixed; left: 18px; z-index: 200;
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(145deg, var(--card), var(--card2));
  border: 1px solid var(--border);
  color: var(--text2); font-size: 19px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.18s cubic-bezier(.4,0,.2,1), box-shadow 0.2s, border-color 0.2s;
  box-shadow: 0 3px 14px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.btn-float:active { transform: scale(0.88); }
.btn-float.theme-btn { bottom: 94px; }
.btn-float.theme-btn:active { box-shadow: 0 0 0 6px rgba(26,111,212,0.18), 0 3px 14px rgba(0,0,0,0.35); }
.btn-float.cache-btn { bottom: 32px; }
.btn-float.cache-btn:active { box-shadow: 0 0 0 6px rgba(221,107,32,0.18), 0 3px 14px rgba(0,0,0,0.35); }

/* ── MONTH PROGRESS CARD (this-month tab) ───────── */
.month-progress-card {
  margin: 12px 16px 4px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  position: relative; z-index: 1;
}
.month-progress-top {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px; color: var(--text2); margin-bottom: 9px;
}
.month-progress-top span:last-child { font-size: 15px; font-weight: 700; color: var(--white); }
.month-progress-track {
  height: 8px; background: var(--gray); border-radius: 4px; overflow: hidden;
}
.month-progress-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--green), var(--blue-lt));
  transition: width 0.6s cubic-bezier(.4,0,.2,1);
}

/* ── CHECKBOX ROW ─────────────────────────────────── */
.checkbox-row {
  display: flex; align-items: center; gap: 9px;
  margin-bottom: 16px; padding: 10px 12px;
  background: var(--card2); border: 1px solid var(--border); border-radius: 10px;
}
.checkbox-row input[type=checkbox] {
  width: 19px; height: 19px; accent-color: var(--blue); flex-shrink: 0;
}
.checkbox-row label { font-size: 13px; color: var(--text); cursor: pointer; }

/* ── PROGRESS BAR FOR TEMP ──────────────────────── */
.temp-progress {
  margin: 0 14px 10px; direction: ltr;
}
.temp-track {
  height: 3px; background: var(--gray);
  border-radius: 2px; overflow: hidden;
}
.temp-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-top">
    <div>
      <div class="app-title">💼 حاسبة <span>الالتزامات</span></div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <button class="btn-refresh-header" onclick="manualRefresh()" id="refreshBtn" title="تحديث">🔄</button>
    <button class="btn-add-header" onclick="openAddModal()">+</button>
  </div>
</header>

<!-- KPI CARDS -->
<div class="kpi-scroll" id="kpiScroll"></div>

<!-- SALARY BAR -->
<div class="salary-bar" id="salaryBar">
  <div class="salary-inner">
    <div class="salary-right">
      <div class="salary-remain-label">المتبقي بعد الالتزامات</div>
      <div class="salary-remain-val zero" id="salaryRemain">—</div>
      <div class="salary-pct-label" id="salaryPct"></div>
    </div>
    <div class="salary-left">
      <div class="salary-label">💰 الراتب الشهري</div>
      <div class="salary-input-wrap">
        <input class="salary-input" id="salaryInput" type="number"
               inputmode="decimal" placeholder="أدخل راتبك"
               oninput="updateSalary()">
      </div>
    </div>
  </div>
  <div class="salary-progress-wrap">
    <div class="salary-progress-fill" id="salaryFill" style="width:0%;background:var(--green)"></div>
  </div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('thismonth',this)">📅 الشهر</button>
  <button class="nav-tab" onclick="switchTab('obligations',this)">🗂️ الكل</button>
  <button class="nav-tab" onclick="switchTab('history',this)">💰 المدفوعات</button>
  <button class="nav-tab" onclick="switchTab('summary',this)">📊 الملخص</button>
</div>

<!-- THIS MONTH TAB (default) -->
<div id="tab-thismonth">
  <div class="month-progress-card" id="monthProgressCard">
    <div class="month-progress-top">
      <span id="monthProgressText">—</span>
      <span id="monthProgressPct">0%</span>
    </div>
    <div class="month-progress-track"><div class="month-progress-fill" id="monthProgressFill" style="width:0%"></div></div>
  </div>
  <div class="section-header">
    <div class="section-title">المتبقي عليك هذا الشهر</div>
    <div class="section-count" id="thisMonthCount">0 متبقٍ</div>
  </div>
  <div class="obligations-list" id="thisMonthList"></div>
</div>

<!-- OBLIGATIONS TAB (Master register — all items) -->
<div id="tab-obligations" style="display:none">
  <div class="filter-bar" id="filterBar"></div>
  <div class="section-header">
    <div class="section-title">كل الالتزامات المسجلة</div>
    <div class="section-count" id="oblCount">0 التزام</div>
  </div>
  <div class="obligations-list" id="oblList"></div>
</div>

<!-- HISTORY TAB -->
<div id="tab-history" style="display:none">
  <div class="section-header">
    <div class="section-title">سجل المدفوعات</div>
    <div class="section-count" id="histCount">0 دفعة</div>
  </div>
  <div class="history-list" id="histList"></div>
</div>

<!-- SUMMARY TAB -->
<div id="tab-summary" style="display:none">
  <div class="section-header">
    <div class="section-title">تحليل الشهر الحالي</div>
  </div>
  <div class="summary-grid" id="summaryGrid"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()">
  <span>+</span> إضافة التزام
</button>
<button class="btn-float theme-btn" onclick="openThemeModal()" title="تخصيص الألوان">🎨</button>
<button class="btn-float cache-btn" onclick="clearCache()" title="مسح الكاش">🧹</button>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="addOverlay" onclick="closeOverlay(event,'addOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">إضافة التزام جديد</div>
    <input type="hidden" id="editId">

    <div class="form-group">
      <label class="form-label">اسم الالتزام *</label>
      <input class="form-control" id="f_name" placeholder="مثل: إيجار السكن">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">الفئة</label>
        <select class="form-control" id="f_cat">
          <option>إيجار</option><option>فواتير</option><option>أقساط</option>
          <option>تأمين</option><option>اشتراكات</option><option>مصاريف ثابتة</option><option>أخرى</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">المبلغ (ر.س) *</label>
        <input class="form-control" id="f_amount" type="number" placeholder="0.00" inputmode="decimal">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">يوم الاستحقاق من الشهر</label>
        <input class="form-control" id="f_day" type="number" min="1" max="31" placeholder="مثال: 15" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label">النوع</label>
        <select class="form-control" id="f_type" onchange="toggleTemp()">
          <option value="دائم">دائم</option>
          <option value="مؤقت-أشهر">مؤقت (أشهر)</option>
          <option value="مؤقت-تاريخ">مؤقت (تاريخ)</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" id="f_months_group" style="display:none">
        <label class="form-label">عدد الأشهر المتبقية</label>
        <input class="form-control" id="f_rem_months" type="number" min="0" inputmode="numeric" placeholder="مثال: 6">
      </div>
      <div class="form-group" id="f_date_group" style="display:none">
        <label class="form-label">تاريخ الانتهاء</label>
        <input class="form-control" id="f_rem_date" type="date">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">ملاحظات</label>
      <input class="form-control" id="f_notes" placeholder="اختياري">
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="f_paid">
      <label for="f_paid">تم دفعها لهذا الشهر بالفعل</label>
    </div>

    <button class="btn-modal-confirm" onclick="saveObligation()">💾 حفظ</button>
    <button class="btn-modal-cancel" onclick="closeModal('addOverlay')">إلغاء</button>
  </div>
</div>

<!-- PAY MODAL -->
<div class="overlay" id="payOverlay" onclick="closeOverlay(event,'payOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✅ تسجيل الدفع</div>
    <input type="hidden" id="payId">

    <div class="pay-info">
      <div class="pay-info-name" id="payName"></div>
      <div class="pay-info-date" id="payDue"></div>
    </div>

    <div class="form-group">
      <label class="form-label">المبلغ المدفوع (ر.س)</label>
      <input class="form-control" id="p_amount" type="number" inputmode="decimal">
    </div>
    <div class="form-group">
      <label class="form-label">طريقة الدفع</label>
      <select class="form-control" id="p_method">
        <option>SADAD</option><option>تحويل بنكي</option>
        <option>بطاقة ائتمان</option><option>نقداً</option><option>STC Pay</option><option>أخرى</option>
      </select>
    </div>

    <button class="btn-modal-confirm" onclick="confirmPayment()" style="background: linear-gradient(135deg,#0D9E5C,#059669); box-shadow: 0 2px 16px rgba(13,158,92,0.4)">
      ✅ سجّل الدفع وحرّك التاريخ
    </button>
    <button class="btn-modal-cancel" onclick="closeModal('payOverlay')">إلغاء</button>
  </div>
</div>


<!-- THEME MODAL -->
<div class="overlay theme-modal" id="themeOverlay" onclick="closeOverlay(event,'themeOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🎨 تخصيص الألوان</div>

    <div class="theme-section-title">🎨 ثيمات جاهزة</div>
    <div class="theme-grid" id="themeGrid"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>// ═══════════════════════════════════════════════════════
// DATA LAYER — localStorage
// ═══════════════════════════════════════════════════════
const KEY_OBL  = 'obls_v1';
const KEY_HIST = 'hist_v1';

function loadObls()  { try { return JSON.parse(localStorage.getItem(KEY_OBL))  || []; } catch { return []; } }
function saveObls(d) { localStorage.setItem(KEY_OBL, JSON.stringify(d)); }
function loadHist()  { try { return JSON.parse(localStorage.getItem(KEY_HIST)) || []; } catch { return []; } }
function saveHist(d) { localStorage.setItem(KEY_HIST, JSON.stringify(d)); }

// ═══════════════════════════════════════════════════════
// MIGRATION — يحول أي بيانات قديمة للنظام الجديد دون فقدانها
// ═══════════════════════════════════════════════════════
function parseArabicDMY(s) {
  if (!s) return null;
  const parts = String(s).split('/').map(x => x.trim());
  if (parts.length !== 3) return null;
  let [d, m, y] = parts.map(Number);
  if (!d || !m || !y || d > 31 || m > 12) return null;
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function migrateSchema() {
  const FLAG = 'schema_v2_done';
  if (localStorage.getItem(FLAG)) return;
  const obls  = loadObls();
  const today = new Date();
  const curKey = monthKey(today);

  const migrated = obls.map(o => {
    // إذا كانت البيانات بالفعل بالتنسيق الجديد (لا يوجد status/dueDate) نتركها كما هي
    if (o.lastPaidMonth !== undefined && o.finished !== undefined && o.status === undefined) {
      return o;
    }
    const type = o.type || 'دائم';
    let remainingMonths, endDate, finished = false, lastPaidMonth = null;

    if (type === 'مؤقت-أشهر') {
      remainingMonths = parseInt(o.rem);
      if (isNaN(remainingMonths)) remainingMonths = 0;
      if (remainingMonths <= 0) finished = true;
    } else if (type === 'مؤقت-تاريخ') {
      endDate = parseArabicDMY(o.rem) || (o.rem && o.rem.includes('-') ? o.rem : null);
      if (endDate && endDate < todayStr()) finished = true;
    }

    if (o.status === 'مدفوع' && !finished) {
      lastPaidMonth = curKey;
    }

    let dueDay = o.dueDay;
    if (!dueDay && o.dueDate) {
      const dd = new Date(o.dueDate + 'T00:00:00');
      if (!isNaN(dd)) dueDay = dd.getDate();
    }
    if (!dueDay) dueDay = 1;

    return {
      id: o.id, name: o.name, cat: o.cat || 'أخرى',
      amount: Number(o.amount) || 0, dueDay,
      type, remainingMonths, endDate,
      notes: o.notes || '', lastPaidMonth, finished,
      createdAt: o.createdAt || new Date().toISOString()
    };
  });

  saveObls(migrated);
  localStorage.setItem(FLAG, '1');
}

// ── بيانات تجريبية عند أول استخدام فقط (لا تمسح بيانات حقيقية) ──
function seedData() {
  if (loadObls().length > 0) return;
  const samples = [
    { name:'إيجار السكن',     cat:'إيجار',     amount:2500, dueDay:1,  type:'دائم', notes:'' },
    { name:'فاتورة الكهرباء', cat:'فواتير',    amount:380,  dueDay:5,  type:'دائم', notes:'' },
    { name:'اشتراك الإنترنت', cat:'اشتراكات',  amount:250,  dueDay:20, type:'دائم', notes:'stc' },
  ];
  const seeded = samples.map((s,i) => ({
    id: Date.now()+i, ...s,
    remainingMonths: undefined, endDate: undefined,
    lastPaidMonth: null, finished: false,
    createdAt: new Date().toISOString()
  }));
  saveObls(seeded);
}

// ═══════════════════════════════════════════════════════
// DATE / MONTH HELPERS
// ═══════════════════════════════════════════════════════
const MONTHS_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو',
                   'يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

function todayStr() { return new Date().toISOString().split('T')[0]; }
function pad2(n) { return String(n).padStart(2,'0'); }
function monthKey(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }

function fmtAmt(n) {
  const num = Number(n);
  if (isNaN(num)) return '0';
  return num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  if (isNaN(dt)) return '—';
  return `${dt.getDate().toLocaleString('en-US')} ${MONTHS_AR[dt.getMonth()]} ${dt.getFullYear().toLocaleString('en-US')}`;
}

// ── منطق الاستحقاق الشهري الديناميكي (بلا تخزين تاريخ ثابت) ──
function clampDay(year, month, day) {
  const maxD = new Date(year, month+1, 0).getDate();
  return Math.min(Math.max(1, day||1), maxD);
}
function dueDateForMonth(o, year, month) {
  return new Date(year, month, clampDay(year, month, o.dueDay));
}
function parseISODate(s) {
  if (!s) return null;
  const dt = new Date(s + 'T00:00:00');
  return isNaN(dt) ? null : dt;
}
function isPaidForMonth(o, refDate) {
  return o.lastPaidMonth === monthKey(refDate);
}
function isActiveForMonth(o, refDate) {
  if (o.finished) return false;
  if (o.type === 'مؤقت-تاريخ' && o.endDate) {
    const end = parseISODate(o.endDate);
    const due = dueDateForMonth(o, refDate.getFullYear(), refDate.getMonth());
    if (end && due > end) return false;
  }
  return true;
}
function getStatus(o, refDate) {
  if (o.finished) return 'منتهي';
  if (!isActiveForMonth(o, refDate)) return 'منتهي';
  if (isPaidForMonth(o, refDate)) return 'مدفوع';
  const due = dueDateForMonth(o, refDate.getFullYear(), refDate.getMonth());
  const todayMid = new Date(); todayMid.setHours(0,0,0,0);
  if (due < todayMid) return 'متأخر';
  return 'قادم';
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let currentFilter = 'الكل';
let currentTab    = 'thismonth';

// ═══════════════════════════════════════════════════════
// RENDER: KPI CARDS
// ═══════════════════════════════════════════════════════
function renderKPI() {
  const obls  = loadObls();
  const today = new Date();

  const activeThisMonth = obls.filter(o => isActiveForMonth(o, today));
  const total     = activeThisMonth.reduce((s,o)=>s+Number(o.amount),0);
  const paidList  = activeThisMonth.filter(o => isPaidForMonth(o, today));
  const paid      = paidList.reduce((s,o)=>s+Number(o.amount),0);
  const lateList  = activeThisMonth.filter(o => getStatus(o,today)==='متأخر');
  const late      = lateList.reduce((s,o)=>s+Number(o.amount),0);

  const nextRef   = new Date(today.getFullYear(), today.getMonth()+1, 1);
  const activeNext= obls.filter(o => isActiveForMonth(o, nextRef));
  const nextTot   = activeNext.reduce((s,o)=>s+Number(o.amount),0);

  const kpis = [
    { label:'📊 الشهر الحالي', amount:total,   cls:'total',   sub: activeThisMonth.length.toLocaleString('en-US') + ' التزام' },
    { label:'✅ مدفوع',        amount:paid,    cls:'paid',    sub: paidList.length.toLocaleString('en-US') + ' بند' },
    { label:'🔴 متأخر',        amount:late,    cls:'late',    sub: lateList.length.toLocaleString('en-US') + ' بند' },
    { label:'📅 الشهر القادم', amount:nextTot, cls:'next',    sub: activeNext.length.toLocaleString('en-US') + ' التزام' },
  ];
  document.getElementById('kpiScroll').innerHTML = kpis.map(k=>`
    <div class="kpi-card ${k.cls}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-amount"><span class="currency">ر.س</span>${fmtAmt(k.amount)}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════
// SHARED CARD RENDERER
// ═══════════════════════════════════════════════════════
function renderObCard(o, refDate) {
  const status = getStatus(o, refDate);
  const statusCls = { 'مدفوع':'paid','متأخر':'late','قادم':'future','منتهي':'done' }[status] || 'future';
  const badgeCls  = { 'مدفوع':'badge-paid','متأخر':'badge-late','قادم':'badge-future','منتهي':'badge-cat' }[status] || 'badge-future';
  const due = dueDateForMonth(o, refDate.getFullYear(), refDate.getMonth());

  let tempHtml = '';
  if (o.type === 'مؤقت-أشهر' && !o.finished) {
    const rm = o.remainingMonths ?? 0;
    tempHtml = `
      <div class="temp-progress">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-bottom:4px;direction:rtl">
          <span>متبقي: ${rm.toLocaleString('en-US')} شهر</span>
        </div>
        <div class="temp-track">
          <div class="temp-fill" style="width:${Math.max(5,Math.min(100,rm*5))}%;background:var(--orange)"></div>
        </div>
      </div>`;
  } else if (o.type === 'مؤقت-تاريخ' && o.endDate && !o.finished) {
    tempHtml = `<div style="padding:0 14px 8px;font-size:11px;color:var(--text2)">ينتهي: ${fmtDate(o.endDate)}</div>`;
  }

  const canPay = status === 'قادم' || status === 'متأخر';

  return `
    <div class="ob-card status-${statusCls}">
      <div class="ob-main">
        <div class="ob-info">
          <div class="ob-name">${o.name}</div>
          <div class="ob-meta">
            <span class="badge badge-cat">${o.cat||'أخرى'}</span>
            <span class="badge ${badgeCls}">${status}</span>
            ${o.type!=='دائم' && !o.finished ? `<span class="rem-badge">${o.type==='مؤقت-أشهر' ? (o.remainingMonths??0).toLocaleString('en-US')+' شهر' : 'مؤقت'}</span>` : ''}
            ${o.notes ? `<span class="badge badge-cat">${o.notes}</span>` : ''}
          </div>
        </div>
        <div class="ob-right">
          <div class="ob-amount">${fmtAmt(o.amount)}<span class="cur"> ر.س</span></div>
          <div class="ob-due">${fmtDate(due.toISOString().split('T')[0])}</div>
        </div>
      </div>
      ${tempHtml}
      <div class="ob-footer">
        ${canPay
          ? `<button class="btn-ob btn-pay" onclick="openPayModal('${o.id}')">✅ سجّل الدفع</button>`
          : `<button class="btn-ob btn-pay" style="background:var(--gray2);color:var(--text2)" disabled>${status}</button>`}
        <button class="btn-ob btn-edit" onclick="openEditModal('${o.id}')" title="تعديل">✏️</button>
        <button class="btn-ob btn-del"  onclick="deleteObl('${o.id}')" title="حذف">🗑</button>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════
// TAB 1: هذا الشهر — يختفي البند فور تسجيل الدفع
// ═══════════════════════════════════════════════════════
function renderThisMonth() {
  const obls  = loadObls();
  const today = new Date();
  const active = obls.filter(o => isActiveForMonth(o, today));
  const unpaid = active.filter(o => !isPaidForMonth(o, today));
  const paidCount  = active.length - unpaid.length;
  const totalCount = active.length;
  const pct = totalCount>0 ? Math.round((paidCount/totalCount)*100) : 0;

  document.getElementById('monthProgressText').textContent =
    totalCount>0 ? `${paidCount.toLocaleString('en-US')} من ${totalCount.toLocaleString('en-US')} مدفوع` : 'لا توجد التزامات مسجلة';
  document.getElementById('monthProgressPct').textContent = pct.toLocaleString('en-US') + '%';
  document.getElementById('monthProgressFill').style.width = pct + '%';

  unpaid.sort((a,b) => {
    const oa = getStatus(a,today)==='متأخر' ? 0 : 1;
    const ob = getStatus(b,today)==='متأخر' ? 0 : 1;
    if (oa!==ob) return oa-ob;
    return (a.dueDay||1) - (b.dueDay||1);
  });

  document.getElementById('thisMonthCount').textContent = unpaid.length.toLocaleString('en-US') + ' متبقٍ';

  if (unpaid.length === 0) {
    document.getElementById('thisMonthList').innerHTML = totalCount===0 ? `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-title">لا توجد التزامات مسجلة</div>
        <div class="empty-sub">اضغط + لإضافة أول التزام</div>
      </div>` : `
      <div class="empty-state">
        <div class="empty-icon">🎉</div>
        <div class="empty-title">تم سداد كل التزامات هذا الشهر!</div>
        <div class="empty-sub">أحسنت، لا يوجد شيء متبقٍ عليك</div>
      </div>`;
    return;
  }
  document.getElementById('thisMonthList').innerHTML = unpaid.map(o=>renderObCard(o,today)).join('');
}

// ═══════════════════════════════════════════════════════
// TAB 2: السجل الرئيسي (الكل) — تسجيل/تعديل/حذف كل الالتزامات
// ═══════════════════════════════════════════════════════
function renderFilters() {
  const filters = ['الكل','متأخر','قادم','مدفوع','منتهي'];
  document.getElementById('filterBar').innerHTML = filters.map(f=>`
    <button class="filter-chip ${f===currentFilter?'active':''}" onclick="setFilter('${f}')">${f}</button>
  `).join('');
}
function setFilter(f) { currentFilter=f; renderFilters(); renderObligations(); }

function renderObligations() {
  const obls  = loadObls();
  const today = new Date();
  let list = obls.map(o => ({ o, status:getStatus(o,today) }));
  if (currentFilter !== 'الكل') list = list.filter(x => x.status===currentFilter);

  const order = { 'متأخر':0,'قادم':1,'مدفوع':2,'منتهي':3 };
  list.sort((a,b) => {
    const od = (order[a.status]??9) - (order[b.status]??9);
    if (od!==0) return od;
    return (a.o.dueDay||1) - (b.o.dueDay||1);
  });

  document.getElementById('oblCount').textContent = list.length.toLocaleString('en-US') + ' التزام';

  if (list.length === 0) {
    document.getElementById('oblList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-title">لا توجد التزامات</div>
        <div class="empty-sub">اضغط + لإضافة التزام جديد</div>
      </div>`;
    return;
  }
  document.getElementById('oblList').innerHTML = list.map(x=>renderObCard(x.o,today)).join('');
}

// ═══════════════════════════════════════════════════════
// TAB 3: سجل المدفوعات
// ═══════════════════════════════════════════════════════
function renderHistory() {
  const hist = loadHist().slice().reverse();
  document.getElementById('histCount').textContent = hist.length.toLocaleString('en-US') + ' دفعة';
  if (hist.length === 0) {
    document.getElementById('histList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📂</div>
        <div class="empty-title">لا توجد مدفوعات مسجلة</div>
        <div class="empty-sub">سيظهر هنا سجل كل الدفعات</div>
      </div>`;
    return;
  }
  document.getElementById('histList').innerHTML = hist.map(h=>`
    <div class="hist-card">
      <div class="hist-left">
        <div class="hist-name">${h.name}</div>
        <div class="hist-meta">${h.method} · ${h.monthLabel}</div>
        <div class="hist-meta">${fmtDate(h.paidDate)}</div>
      </div>
      <div class="hist-right">
        <div class="hist-amount">${fmtAmt(h.amount)} <span style="font-size:11px;font-weight:400;color:var(--text2)">ر.س</span></div>
        <div class="hist-method">${h.cat||''}</div>
      </div>
      <button class="hist-del" onclick="deleteHistEntry('${h.id}')" title="حذف الدفعة">🗑</button>
    </div>`).join('');
}

function deleteHistEntry(id) {
  const hist = loadHist();
  const h = hist.find(x => String(x.id)===String(id));
  if (!h) return;
  showConfirm('حذف دفعة "' + h.name + '" (' + fmtAmt(h.amount) + ' ر.س)؟ هذا يحذف السجل فقط ولا يغيّر حالة الالتزام.', function() {
    saveHist(loadHist().filter(x => String(x.id)!==String(id)));
    renderHistory();
    showToast('تم حذف الدفعة من السجل');
  });
}

// ═══════════════════════════════════════════════════════
// TAB 4: الملخص
// ═══════════════════════════════════════════════════════
function renderSummary() {
  const obls  = loadObls();
  const today = new Date();
  const active = obls.filter(o => isActiveForMonth(o, today));
  const total  = active.reduce((s,o)=>s+Number(o.amount),0);

  const cats  = ['إيجار','فواتير','أقساط','تأمين','اشتراكات','مصاريف ثابتة','أخرى'];
  const icons = {'إيجار':'🏠','فواتير':'🔌','أقساط':'💳','تأمين':'🛡️','اشتراكات':'📱','مصاريف ثابتة':'📌','أخرى':'📦'};
  const colors= {'إيجار':'#1A6FD4','فواتير':'#7C3AED','أقساط':'#DD6B20',
                 'تأمين':'#0D9E5C','اشتراكات':'#DB2777','مصاريف ثابتة':'#0891B2','أخرى':'#6B7280'};
  const statuses = [
    {label:'✅ مدفوع',k:'مدفوع',c:'#0D9E5C'},
    {label:'🔴 متأخر',k:'متأخر',c:'#E53E3E'},
    {label:'📅 قادم', k:'قادم', c:'#1A6FD4'},
  ];

  let html = '';
  statuses.forEach(s => {
    const arr = active.filter(o => getStatus(o,today)===s.k);
    const amt = arr.reduce((a,o)=>a+Number(o.amount),0);
    const pct = total ? (amt/total*100) : 0;
    html += `
      <div class="sum-card">
        <div class="sum-label">${s.label}</div>
        <div class="sum-value">${fmtAmt(amt)} <span style="font-size:11px;color:var(--text2)">ر.س</span></div>
        <div style="font-size:11px;color:var(--text2);margin-top:3px">${arr.length.toLocaleString('en-US')} بند · ${pct.toFixed(0).toLocaleString('en-US')}%</div>
        <div class="sum-bar-wrap"><div class="sum-bar" style="width:${pct}%;background:${s.c}"></div></div>
      </div>`;
  });
  cats.forEach(cat => {
    const arr = active.filter(o => o.cat===cat);
    const amt = arr.reduce((a,o)=>a+Number(o.amount),0);
    if (amt===0) return;
    const pct = total ? (amt/total*100) : 0;
    html += `
      <div class="sum-card">
        <div class="sum-label">${icons[cat]||''} ${cat}</div>
        <div class="sum-value">${fmtAmt(amt)} <span style="font-size:11px;color:var(--text2)">ر.س</span></div>
        <div style="font-size:11px;color:var(--text2);margin-top:3px">${pct.toFixed(0).toLocaleString('en-US')}% من الإجمالي</div>
        <div class="sum-bar-wrap"><div class="sum-bar" style="width:${pct}%;background:${colors[cat]||'#6B7280'}"></div></div>
      </div>`;
  });
  document.getElementById('summaryGrid').innerHTML = html;
}

// ═══════════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════════
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-thismonth').style.display   = tab==='thismonth'   ? '' : 'none';
  document.getElementById('tab-obligations').style.display = tab==='obligations' ? '' : 'none';
  document.getElementById('tab-history').style.display     = tab==='history'     ? '' : 'none';
  document.getElementById('tab-summary').style.display     = tab==='summary'     ? '' : 'none';
  if (tab==='thismonth')   renderThisMonth();
  if (tab==='obligations') { renderFilters(); renderObligations(); }
  if (tab==='history')     renderHistory();
  if (tab==='summary')     renderSummary();
}

// ═══════════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════════
function openAddModal() {
  document.getElementById('modalTitle').textContent = 'إضافة التزام جديد';
  document.getElementById('editId').value = '';
  ['f_name','f_amount','f_day','f_notes','f_rem_months','f_rem_date'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_cat').value  = 'إيجار';
  document.getElementById('f_type').value = 'دائم';
  document.getElementById('f_paid').checked = false;
  toggleTemp();
  document.getElementById('addOverlay').classList.add('open');
}

function openEditModal(id) {
  const o = loadObls().find(x => String(x.id)===String(id));
  if (!o) return;
  document.getElementById('modalTitle').textContent = 'تعديل الالتزام';
  document.getElementById('editId').value    = id;
  document.getElementById('f_name').value    = o.name;
  document.getElementById('f_cat').value     = o.cat;
  document.getElementById('f_amount').value  = o.amount;
  document.getElementById('f_day').value     = o.dueDay || '';
  document.getElementById('f_type').value    = o.type || 'دائم';
  document.getElementById('f_rem_months').value = o.remainingMonths ?? '';
  document.getElementById('f_rem_date').value   = o.endDate || '';
  document.getElementById('f_notes').value   = o.notes || '';
  document.getElementById('f_paid').checked  = isPaidForMonth(o, new Date());

  document.getElementById('addOverlay').classList.add('open');
}

function toggleTemp() {
  const t = document.getElementById('f_type').value;
  document.getElementById('f_months_group').style.display = t==='مؤقت-أشهر'  ? '' : 'none';
  document.getElementById('f_date_group').style.display   = t==='مؤقت-تاريخ' ? '' : 'none';
}

function openPayModal(id) {
  const o = loadObls().find(x => String(x.id)===String(id));
  if (!o) return;
  const today = new Date();
  const due = dueDateForMonth(o, today.getFullYear(), today.getMonth());
  document.getElementById('payId').value = id;
  document.getElementById('payName').textContent = o.name;
  document.getElementById('payDue').textContent  = 'الاستحقاق: ' + fmtDate(due.toISOString().split('T')[0]) + ' · ' + fmtAmt(o.amount) + ' ر.س';
  document.getElementById('p_amount').value = o.amount;
  document.getElementById('p_method').value = 'SADAD';
  document.getElementById('payOverlay').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeOverlay(e, id) { if (e.target.id === id) closeModal(id); }

// ═══════════════════════════════════════════════════════
// SAVE OBLIGATION (Add/Edit)
// ═══════════════════════════════════════════════════════
function saveObligation() {
  const name   = document.getElementById('f_name').value.trim();
  const amount = parseFloat(document.getElementById('f_amount').value);
  if (!name)        { showToast('أدخل اسم الالتزام', true); return; }
  if (isNaN(amount)||amount<=0) { showToast('أدخل مبلغاً صحيحاً', true); return; }

  const day  = parseInt(document.getElementById('f_day').value) || 1;
  const type = document.getElementById('f_type').value;
  const paidChecked = document.getElementById('f_paid').checked;
  const today = new Date();

  let remainingMonths, endDate, finished = false;
  if (type === 'مؤقت-أشهر') {
    remainingMonths = parseInt(document.getElementById('f_rem_months').value);
    if (isNaN(remainingMonths) || remainingMonths < 0) remainingMonths = 0;
    if (remainingMonths === 0) finished = true;
  } else if (type === 'مؤقت-تاريخ') {
    endDate = document.getElementById('f_rem_date').value || null;
    if (endDate && endDate < todayStr()) finished = true;
  }

  const lastPaidMonth = paidChecked ? monthKey(today) : null;

  const obj = {
    name, cat: document.getElementById('f_cat').value, amount,
    dueDay: day, type, remainingMonths, endDate,
    notes: document.getElementById('f_notes').value.trim(),
    lastPaidMonth, finished,
  };

  const obls   = loadObls();
  const editId = document.getElementById('editId').value;
  if (editId) {
    const idx = obls.findIndex(x => String(x.id)===String(editId));
    if (idx !== -1) obls[idx] = { ...obls[idx], ...obj };
  } else {
    obj.id = Date.now();
    obj.createdAt = new Date().toISOString();
    obls.push(obj);
  }
  saveObls(obls);
  closeModal('addOverlay');
  renderAll();
  showToast(editId ? 'تم التعديل ✓' : 'تمت الإضافة ✓');
}

// ═══════════════════════════════════════════════════════
// CONFIRM PAYMENT — يختفي البند فوراً من "هذا الشهر"
// ═══════════════════════════════════════════════════════
function confirmPayment() {
  const id     = document.getElementById('payId').value;
  const amount = parseFloat(document.getElementById('p_amount').value);
  const method = document.getElementById('p_method').value;
  if (isNaN(amount)||amount<=0) { showToast('أدخل مبلغاً صحيحاً', true); return; }

  const obls = loadObls();
  const idx  = obls.findIndex(x => String(x.id)===String(id));
  if (idx === -1) return;
  const o = obls[idx];
  const today = new Date();
  const mKey  = monthKey(today);
  const ml    = MONTHS_AR[today.getMonth()] + ' ' + today.getFullYear().toLocaleString('en-US');

  // 1. سجل في تاريخ المدفوعات
  const hist = loadHist();
  hist.push({
    id: Date.now(), oblId:o.id, name:o.name, cat:o.cat,
    amount, method, paidDate: todayStr(), monthLabel: ml,
  });
  saveHist(hist);

  // 2. علّم الالتزام كمدفوع لهذا الشهر — يختفي فوراً من "هذا الشهر"
  obls[idx].lastPaidMonth = mKey;

  // 3. أنقص الأشهر المتبقية للمؤقت، أو تحقق من انتهاء تاريخ الانتهاء
  if (o.type === 'مؤقت-أشهر') {
    let rm = (o.remainingMonths ?? 1) - 1;
    if (rm < 0) rm = 0;
    obls[idx].remainingMonths = rm;
    if (rm <= 0) obls[idx].finished = true;
  } else if (o.type === 'مؤقت-تاريخ' && o.endDate) {
    const nextRef = new Date(today.getFullYear(), today.getMonth()+1, 1);
    const nextDue = dueDateForMonth(o, nextRef.getFullYear(), nextRef.getMonth());
    const end = parseISODate(o.endDate);
    if (end && nextDue > end) obls[idx].finished = true;
  }

  saveObls(obls);
  closeModal('payOverlay');
  renderAll();
  showToast(`✅ تم تسجيل دفع ${o.name} لهذا الشهر`);
}

// DELETE
// ═══════════════════════════════════════════════════════
function deleteObl(id) {
  const obls = loadObls();
  const o    = obls.find(x => String(x.id)===String(id));
  if (!o) return;
  showConfirm('حذف "' + o.name + '"؟', function() {
    saveObls(loadObls().filter(x => String(x.id)!==String(id)));
    renderAll();
    showToast('تم الحذف');
  });
}

function showConfirm(msg, onYes, opts) {
  opts = opts || {};
  const label = opts.label || '🗑 حذف';
  const bg    = opts.bg    || 'linear-gradient(135deg,#E53E3E,#C53030)';
  const shadow= opts.shadow|| '0 2px 16px rgba(229,62,62,0.4)';

  const overlay = document.getElementById('confirmOverlay');
  document.getElementById('confirmMsg').textContent = msg;
  const yesBtn = document.getElementById('confirmYes');
  yesBtn.textContent = label;
  yesBtn.style.background = bg;
  yesBtn.style.boxShadow  = shadow;
  yesBtn.onclick = function() {
    overlay.classList.remove('open');
    onYes();
  };
  document.getElementById('confirmNo').onclick = function() {
    overlay.classList.remove('open');
  };
  overlay.classList.add('open');
}

// ═══════════════════════════════════════════════════════
// SALARY
// ═══════════════════════════════════════════════════════
function updateSalary() {
  const salary = parseFloat(document.getElementById('salaryInput').value) || 0;
  const obls   = loadObls();
  const today  = new Date();
  const total  = obls.filter(o => isActiveForMonth(o, today)).reduce((s,o)=>s+Number(o.amount),0);

  const remain = salary - total;
  const pct    = salary > 0 ? Math.min(100, Math.max(0, (remain/salary)*100)) : 0;

  const el  = document.getElementById('salaryRemain');
  const bar = document.getElementById('salaryFill');

  if (salary === 0) {
    el.textContent = '—';
    el.className = 'salary-remain-val zero';
    bar.style.width = '0%';
    return;
  }

  el.textContent = (remain >= 0 ? '+' : '') + remain.toLocaleString('en-US', {maximumFractionDigits:0}) + ' ر.س';
  el.className   = 'salary-remain-val ' + (remain > 0 ? 'positive' : remain < 0 ? 'negative' : 'zero');
  bar.style.width      = pct + '%';
  bar.style.background = remain >= 0 ? 'var(--green)' : 'var(--red)';
  const pctEl = document.getElementById('salaryPct');
  if (pctEl) pctEl.textContent = pct.toFixed(0).toLocaleString('en-US') + '% متبقي من الراتب';

  localStorage.setItem('salary_v1', salary);
}

function loadSalary() {
  const s = localStorage.getItem('salary_v1');
  if (s) {
    document.getElementById('salaryInput').value = s;
    updateSalary();
  }
}

function applyTheme(vars) {
  const root = document.documentElement;
  Object.entries(vars).forEach(([k,v]) => {
    root.style.setProperty(k, v);
    // update derived vars
    if (k === '--navy') {
      root.style.setProperty('--gray', v);
    }
  });
  // sync color pickers
  document.querySelectorAll('.color-row input[type=color]').forEach(inp => {
    const cssVar = inp.dataset.var;
    inp.value = rgbToHex(getComputedStyle(document.documentElement).getPropertyValue(cssVar).trim()) || inp.value;
  });
}

function saveTheme() {
  const root  = getComputedStyle(document.documentElement);
  const saved = {};
  EDITABLE_VARS.forEach(v => {
    saved[v.key] = root.getPropertyValue(v.key).trim();
  });
  localStorage.setItem(THEME_KEY, JSON.stringify(saved));
}

function loadTheme() {
  const raw = localStorage.getItem(THEME_KEY);
  if (!raw) return;
  try { applyTheme(JSON.parse(raw)); } catch(e) {}
}

function resetTheme() {
  localStorage.removeItem(THEME_KEY);
  const root = document.documentElement;
  EDITABLE_VARS.forEach(v => root.style.removeProperty(v.key));
  renderColorEditor();
  markSelectedTheme(-1);
  showToast('تم إعادة التعيين ✓');
}

function rgbToHex(str) {
  if (!str) return '#000000';
  if (str.startsWith('#')) {
    // ensure 6-digit
    let h = str.replace('#','');
    if (h.length===3) h = h.split('').map(c=>c+c).join('');
    return '#' + h.padEnd(6,'0').slice(0,6);
  }
  const m = str.match(/\d+/g);
  if (!m || m.length < 3) return '#000000';
  return '#' + m.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
}

function openThemeModal() {
  renderThemeSwatches();
  renderColorEditor();
  document.getElementById('themeOverlay').classList.add('open');
}

function renderThemeSwatches() {
  const grid = document.getElementById('themeGrid');
  grid.innerHTML = PRESET_THEMES.map((t,i) => {
    const colors = Object.values(t.vars).slice(0,4);
    return `<div class="theme-swatch" id="swatch_${i}" onclick="applyPreset(${i})">
      <div class="theme-swatch-preview">
        ${colors.map(c=>`<span style="background:${c}"></span>`).join('')}
      </div>
      <div class="theme-swatch-name">${t.name}</div>
    </div>`;
  }).join('');
}

function applyPreset(i) {
  applyTheme(PRESET_THEMES[i].vars);
  saveTheme();
  renderColorEditor();
  markSelectedTheme(i);
  showToast('تم تطبيق الثيم ✓');
}

function markSelectedTheme(selected) {
  document.querySelectorAll('.theme-swatch').forEach((el,i) => {
    el.classList.toggle('selected', i === selected);
  });
}

function renderColorEditor() {
  const root   = getComputedStyle(document.documentElement);
  const editor = document.getElementById('colorEditor');
  editor.innerHTML = EDITABLE_VARS.map(v => {
    const raw = root.getPropertyValue(v.key).trim();
    const hex = rgbToHex(raw);
    return `<div class="color-row">
      <label>${v.label}</label>
      <input type="color" data-var="${v.key}" value="${hex}"
             oninput="onColorChange(this)">
    </div>`;
  }).join('');
}

function onColorChange(inp) {
  const cssVar = inp.dataset.var;
  document.documentElement.style.setProperty(cssVar, inp.value);
  saveTheme();
  markSelectedTheme(-1); // deselect preset
}
